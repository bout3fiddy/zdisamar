name: Canary

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zig-canary:
    name: Zig Canary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - name: Run check on Zig canary
        run: zig build check
      - name: Run fast suite on Zig canary
        run: zig build test-fast
