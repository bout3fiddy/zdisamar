name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-ci:
    name: Linux CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Run blocking CI mirror
        run: zig build ci

  linux-tidy:
    name: Linux Tidy (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Run advisory tidy lane
        run: zig build tidy || true
      - name: Upload tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tidy-report
          path: out/ci/tidy/report.json
          if-no-files-found: ignore

  macos-smoke:
    name: macOS Smoke (Advisory)
    runs-on: macos-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Compile and run unit-focused smoke lane
        run: zig build check
