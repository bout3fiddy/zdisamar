schema_version: 1

metadata:
  id: s5p_o2a_twin_expert
  workspace: s5p-o2a-twin
  description: >
    Expert O2 A-band synthetic retrieval example with deliberate truth/retrieval
    mismatch, operational O2 and O2-O2 support data, weighted reference grids,
    ISRF-table ingestion, nuisance-state fitting, and multi-product export.

inputs:
  assets:
    atmosphere_profile:
      kind: file
      path: data/climatologies/us_standard_1976_profile.csv
      format: profile_csv

    o2_hitran:
      kind: file
      path: data/cross_sections/o2a_hitran_subset_07_hit08_tropomi.par
      format: hitran_par

    o2_line_mixing:
      kind: file
      path: data/cross_sections/o2a_lisa_rmf_subset.dat
      format: lisa_rmf

    o2_strong_lines:
      kind: file
      path: data/cross_sections/o2a_lisa_sdf_subset.dat
      format: lisa_sdf

    o2o2_cia:
      kind: file
      path: data/cross_sections/o2o2_bira_o2a_subset.dat
      format: bira_cia

    refspec_metadata:
      kind: file
      path: data/examples/irr_rad_channels_operational_refspec_demo.txt
      format: spectral_ascii

    isrf_metadata:
      kind: file
      path: data/examples/irr_rad_channels_operational_isrf_table_demo.txt
      format: spectral_ascii

  ingests:
    refspec_demo:
      adapter: spectral_ascii
      asset: refspec_metadata

    isrf_demo:
      adapter: spectral_ascii
      asset: isrf_metadata

templates:
  o2a_reference_case:
    plan:
      model_family: disamar_standard

      transport:
        solver: dispatcher
        provider: builtin.transport_dispatcher

      execution:
        solver_mode: scalar
        derivative_mode: none

    scene:
      geometry:
        model: pseudo_spherical
        solar_zenith_deg: 31.7
        viewing_zenith_deg: 7.9
        relative_azimuth_deg: 143.4

      atmosphere:
        layering:
          layer_count: 48
          sublayer_divisions: 3
        thermodynamics:
          profile:
            source:
              asset: atmosphere_profile
        boundary:
          surface_pressure_hpa: 1013.0

      bands:
        o2a:
          start_nm: 758.0
          end_nm: 771.0
          step_nm: 0.01
          exclude:
            - [759.35, 759.55]
            - [770.50, 770.80]

      absorbers:
        o2:
          species: o2
          profile:
            source: atmosphere
          spectroscopy:
            model: line_by_line
            line_list_asset: o2_hitran
            line_mixing_asset: o2_line_mixing
            strong_lines_asset: o2_strong_lines

        o2o2:
          species: o2o2
          profile:
            source: atmosphere
          spectroscopy:
            model: cia
            cia_asset: o2o2_cia

      surface:
        model: lambertian
        provider: builtin.lambertian_surface
        albedo: 0.050

      aerosols:
        plume:
          model: hg_layer
          optical_depth_550_nm: 0.12
          single_scatter_albedo: 0.93
          asymmetry_factor: 0.68
          angstrom_exponent: 1.2
          layer_center_km: 3.0
          layer_width_km: 2.0

      measurement_model:
        regime: nadir

        instrument:
          name: tropomi

        sampling:
          mode: native
          high_resolution_step_nm: 0.01
          high_resolution_half_span_nm: 0.40

        spectral_response:
          shape: gaussian
          fwhm_nm: 0.54

        illumination:
          solar_spectrum:
            source: bundle_default

        calibration:
          wavelength_shift_nm: 0.000
          multiplicative_offset: 1.000
          stray_light: 0.0000

        noise:
          model: shot_noise
          seed: 42

experiment:
  simulation:
    from: o2a_reference_case

    scene:
      id: truth_scene

      surface:
        model: lambertian
        provider: builtin.lambertian_surface
        albedo: 0.062

      aerosols:
        plume:
          model: hg_layer
          optical_depth_550_nm: 0.22
          single_scatter_albedo: 0.93
          asymmetry_factor: 0.68
          angstrom_exponent: 1.2
          layer_center_km: 4.2
          layer_width_km: 1.1

      measurement_model:
        spectral_response:
          shape: gaussian
          fwhm_nm: 0.50

        illumination:
          solar_spectrum:
            source: bundle_default

        calibration:
          wavelength_shift_nm: 0.018
          multiplicative_offset: 1.003
          stray_light: 0.0007

        noise:
          model: shot_noise
          seed: 424242

    products:
      truth_radiance:
        kind: measurement_space
        observable: radiance
        apply_noise: true

      truth_surrogate_reflectance:
        kind: measurement_space
        observable: surrogate_reflectance
        apply_noise: false

      truth_diagnostics:
        kind: diagnostics

    diagnostics:
      provenance: true

  retrieval:
    from: o2a_reference_case

    plan:
      execution:
        derivative_mode: semi_analytical

    scene:
      id: retrieval_scene

      surface:
        model: lambertian
        provider: builtin.lambertian_surface
        albedo: 0.040

      aerosols:
        plume:
          model: hg_layer
          optical_depth_550_nm: 0.10
          single_scatter_albedo: 0.93
          asymmetry_factor: 0.68
          angstrom_exponent: 1.2
          layer_center_km: 3.0
          layer_width_km: 2.0

      measurement_model:
        sampling:
          mode: measured_channels
          high_resolution_step_nm: 0.08
          high_resolution_half_span_nm: 0.32

        spectral_response:
          shape: table
          table:
            from_ingest: isrf_demo.instrument_line_shape_table

        illumination:
          solar_spectrum:
            from_ingest: refspec_demo.operational_solar_spectrum

        supporting_data:
          weighted_reference_grid:
            from_ingest: refspec_demo.operational_refspec_grid

        calibration:
          wavelength_shift_nm: 0.000
          multiplicative_offset: 1.000
          stray_light: 0.0000

      absorbers:
        o2:
          spectroscopy:
            operational_lut:
              from_ingest: refspec_demo.o2_operational_lut

        o2o2:
          spectroscopy:
            operational_lut:
              from_ingest: refspec_demo.o2o2_operational_lut

    inverse:
      algorithm:
        name: oe
        provider: builtin.oe_solver
        parameters:
          damping: levenberg_marquardt

      measurement:
        source: truth_radiance
        observable: radiance
        mask:
          band: o2a
          exclude:
            - [759.35, 759.55]
            - [770.50, 770.80]
        error_model:
          from_source_noise: true
          floor_radiance: 1.0e-4

      state:
        aerosol_tau:
          target: scene.aerosols.plume.optical_depth_550_nm
          transform: log
          prior:
            mean: 0.10
            sigma: 0.12
          bounds: [1.0e-4, 5.0]

        aerosol_height:
          target: scene.aerosols.plume.layer_center_km
          prior:
            mean: 3.0
            sigma: 1.0
          bounds: [0.0, 12.0]

        surface_albedo:
          target: scene.surface.albedo
          transform: logit
          prior:
            mean: 0.040
            sigma: 0.020
          bounds: [0.0, 1.0]

        wavelength_shift:
          target: scene.measurement_model.calibration.wavelength_shift_nm
          prior:
            mean: 0.000
            sigma: 0.030
          bounds: [-0.20, 0.20]

        multiplicative_offset:
          target: scene.measurement_model.calibration.multiplicative_offset
          prior:
            mean: 1.000
            sigma: 0.020
          bounds: [0.90, 1.10]

        stray_light:
          target: scene.measurement_model.calibration.stray_light
          prior:
            mean: 0.0000
            sigma: 0.0010
          bounds: [-0.01, 0.01]

      covariance:
        blocks:
          - members: [aerosol_tau, aerosol_height]
            correlation: 0.30

      fit_controls:
        max_iterations: 8
        trust_region: lm

      convergence:
        cost_relative: 1.0e-3
        state_relative: 1.0e-3

    products:
      retrieved_state:
        kind: state_vector

      fitted_radiance:
        kind: fitted_measurement

      jacobian:
        kind: jacobian

      retrieval_result:
        kind: result

    diagnostics:
      provenance: true
      jacobians: true

outputs:
  - from: truth_radiance
    format: netcdf_cf
    destination_uri: file://out/s5p_o2a_truth_radiance.nc
    include_provenance: true

  - from: retrieval_result
    format: netcdf_cf
    destination_uri: file://out/s5p_o2a_retrieval.nc
    include_provenance: true

  - from: fitted_radiance
    format: zarr
    destination_uri: file://out/s5p_o2a_fitted_radiance.zarr

validation:
  strict_unknown_fields: true
  require_resolved_assets: true
  require_resolved_stage_references: true

  synthetic_retrieval:
    warn_if_models_are_identical: true
    require_explicit_acknowledgement_if_identical: false
